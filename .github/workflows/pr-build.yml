name: PR Build

on:
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      PLUGINS_VERSION: "0.0.0.a${{ github.event.pull_request.number }}"
    permissions:
      actions: write
      contents: read
    outputs:
      plugins-version: ${{ env.PLUGINS_VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up dependencies
        uses: ./.github/actions/setup-deps

      - name: Build, test and upload artifact
        uses: ./.github/actions/build-and-upload
        with:
          version-number: ${{ env.PLUGINS_VERSION }}
          retention-days: 7

  comment-artifact-link:
    needs: test-and-build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      PLUGINS_VERSION: ${{ needs.test-and-build.outputs.plugins-version }}
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Post PR comment with artifact link
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            const body = `✅ Build complete for PR #${process.env.PR_NUMBER}\n\nArtifacts are available from this workflow run:\n- [View run and download artifacts](${runUrl})\n\nThe package version used for this build is \\\`${process.env.PLUGINS_VERSION}\\\`.`
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            })
