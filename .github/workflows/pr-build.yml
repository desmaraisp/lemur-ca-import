name: PR Build

on:
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      CA_IMPORTER_VERSION: "0.0.0.postpr${{ github.event.pull_request.number }}"
      ARTIFACT_PREFIX: "pr-${{ github.event.pull_request.number }}"
      PR_NUMBER: ${{ github.event.pull_request.number }}
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build
          python -m pip install .
          python -m pip install -e '.[tests]'

      - name: Run tests
        run: python -m pytest

      - name: Build package
        run: |
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.ARTIFACT_PREFIX }}-dist
          path: dist/*

      - name: Post PR comment with artifact link
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            const body = `✅ Build complete for PR #${process.env.PR_NUMBER}\n\nArtifacts are available from this workflow run:\n- [View run and download artifacts](${runUrl})\n\nThe package version used for this build is \\`${process.env.CA_IMPORTER_VERSION}\\`.`
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            })
