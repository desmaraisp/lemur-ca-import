name: Release CI

on:
  release:
    types: [published]

jobs:
  validate-tag-format:
    runs-on: ubuntu-latest
    steps:
    - name: Validate version vs prerelease flag
      run: |
        VERSION="${{ github.event.release.tag_name }}"

        # Remove leading 'v' if present
        if [[ "$VERSION" == v* ]]; then
          VERSION="${VERSION:1}"
        fi

        if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(a|b|rc)[0-9]+$ ]]; then
            echo "GitHub release marked prerelease, but version is not a valid PEP440 prerelease"
            exit 1
          fi
        else
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(a|b|rc)[0-9]+$ ]]; then
            echo "Stable release cannot use prerelease version"
            exit 1
          fi
        fi
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install .
          python -m pip install -e '.[tests]'

      - name: Run tests
        run: python -m pytest

  build:
    needs:
      - test
      - validate-tag-format
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      CA_IMPORTER_VERSION: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install .
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/lemur-ca-import
    permissions:
      actions: read
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          attestations: true
