name: 'Set up Dependencies'

description: 'Set up all project dependencies'

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

    - name: Install test dependencies
      shell: bash
      run: |
        sudo apt install -y --no-install-recommends python3-dev libpq-dev build-essential libssl-dev libffi-dev libsasl2-dev libldap2-dev
        uv sync --all-packages --all-groups --locked
